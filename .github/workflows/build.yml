name: Build Windows EXE
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --noconsole --name chrOSRecoveryDL --add-data "config.json;." app.py

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: chromeOS-RecoveryDL
          path: dist/chrOSRecoveryDL.exe
